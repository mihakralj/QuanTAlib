#-------------------------------------------------------------------------------#
#               Qodana analysis is configured by qodana.yaml file               #
#             https://www.jetbrains.com/help/qodana/qodana-yaml.html            #
#-------------------------------------------------------------------------------#
version: "1.0"
profile:
  name: qodana.starter

linter: jetbrains/qodana-dotnet:2025.3

dotnet:
  solution: QuanTAlib.sln
  frameworks: "net10.0"
  configuration: Debug

# Disabled failure conditions - Qodana should never fail the build
# Issues are reported for informational purposes only
# failureConditions:
#   severityThresholds:
#     critical: -1
#     high: -1
#     moderate: -1
#     low: -1
#     info: -1

exclude:
  - name: All
    paths:
      - "**/bin/**"
      - "**/obj/**"
      - "**/packages/**"
      - "**/TestResults/**"
      - "**/.vs/**"
      - "**/.vscode/**"
      - "**/.idea/**"
      - "**/.git/**"
      - ".github/**"
      - "**/.github/**"
      - ".github/TradingPlatform.BusinessLayer.xml"
      - "**/TradingPlatform.BusinessLayer.xml"
      - "**/.agent/**"
      - "**/.codacy/**"
      - "**/.config/**"
      - "**/.clinerules/**"
      - "**/.idea/**"
      - "**/.qodana/**"
      - "**/.sonarlint/**"
      - "**/coverage/**"
      - "**/CoverageReport/**"
      - "**/archive/**"
      - "**/notebooks/**"
      - "**/*.Designer.cs"
      - "**/*.generated.cs"
      - "**/results/**"
      - "**/TestResults/**"
      - "**/BenchmarkDotNet.Artifacts/**"
      - "**/*.md"
  - name: InvalidXmlDocComment
  - name: EnforceIfStatementBraces
  - name: CheckNamespace
  - name: LoopCanBeConvertedToQuery
  - name: UnusedAutoPropertyAccessor.Global
  - name: RedundantArgumentDefaultValue
