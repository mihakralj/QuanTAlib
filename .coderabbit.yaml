# yaml-language-server: $schema=https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json
# CodeRabbit Configuration for QuanTAlib - High-Performance C# Trading Library
# Documentation: https://docs.coderabbit.ai/reference/configuration

language: en-US
tone_instructions: "Focus on performance, memory allocation, SIMD optimization, and numerical accuracy. Flag any heap allocations in hot paths."
early_access: true
enable_free_tier: true

reviews:
  profile: assertive  # More thorough for a performance-critical library
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  review_status: true
  commit_status: true
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: false  # Not useful for indicator calculations
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  suggested_reviewers: true
  poem: false  # Keep it professional

  path_filters:
    # Include all C# source files in lib
    - "lib/**/*.cs"

    # Exclude test files
    - "!**/*.Tests.cs"
    - "!**/*Tests.cs"
    - "!**/*.Validation.Tests.cs"

    # Exclude Quantower adapters (platform-specific wrappers)
    - "!**/*.Quantower.Tests.cs"
    - "!**/*.Quantower.cs"
    - "!**/quantower/**"

    # Exclude stable categories to stay under 300 file Pro limit
    - "!lib/errors/**"

    # Exclude build/IDE artifacts
    - "!**/bin/**"
    - "!**/obj/**"
    - "!**/.vs/**"
    - "!**/.git/**"
    - "!**/BenchmarkDotNet.Artifacts/**"
    - "!**/perf/**"
    - "!**/Mocks/**"

  path_instructions:
    - path: "lib/core/**"
      instructions: "Core infrastructure - ensure thread safety, zero allocations, and proper Span<T>/Memory<T> usage."
    - path: "lib/trends_IIR/**"
      instructions: "IIR filters - verify numerical stability, check for FMA opportunities, validate state rollback for isNew=false."
    - path: "lib/trends_FIR/**"
      instructions: "FIR filters - check SIMD vectorization opportunities, verify RingBuffer usage, ensure O(1) updates."
    - path: "lib/filters/**"
      instructions: "Signal processing filters - verify frequency response, check for numerical stability at edge cases."
    - path: "**/*.cs"
      instructions: |
        QuanTAlib coding standards:
        - No heap allocations in Update() methods
        - Use Math.FusedMultiplyAdd for a*b+c patterns
        - Support isNew=false for bar correction (state rollback)
        - Handle NaN/Infinity with last-valid-value substitution
        - Use [MethodImpl(AggressiveInlining)] for hot paths

  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "draft"
    drafts: false
    base_branches:
      - main
      - master

  finishing_touches:
    docstrings:
      enabled: false  # XML docs handled separately
    unit_tests:
      enabled: false  # Tests excluded from review

  tools:
    # Disable tools not relevant to C#
    shellcheck:
      enabled: false
    ruff:
      enabled: false
    eslint:
      enabled: false
    flake8:
      enabled: false
    pylint:
      enabled: false
    rubocop:
      enabled: false
    phpstan:
      enabled: false
    golangci-lint:
      enabled: false
    swiftlint:
      enabled: false
    detekt:
      enabled: false

    # Keep enabled for config files
    yamllint:
      enabled: true
    markdownlint:
      enabled: true
    gitleaks:
      enabled: true  # Security - detect secrets
    github-checks:
      enabled: true
      timeout_ms: 90000

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - ".clinerules/**"
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto