#-------------------------------------------------------------------------------#
#               Qodana analysis is configured by qodana.yaml file               #
#             https://www.jetbrains.com/help/qodana/qodana-yaml.html            #
#-------------------------------------------------------------------------------#
version: "1.0"

# Qodana for .NET (full version)
linter: qodana-dotnet

# Inspection profile
profile:
  name: qodana.recommended

# .NET project configuration
dotnet:
  solution: QuanTAlib.sln
  configuration: Release

# Code coverage configuration
coverage:
  reportProblems: true      # Report coverage problems

# Quality gate thresholds
failureConditions:
  severityThresholds:
    critical: 0     # Fail on any critical issues
    high: 50        # Fail if high severity exceeds 50
    any: 500        # Fail if total problems exceed 500

# Path exclusions
exclude:
  - name: All
    paths:
      # Build artifacts
      - "**/bin/**"
      - "**/obj/**"
      - "**/packages/**"
      - "**/TestResults/**"
      - "**/results/**"
      - "**/BenchmarkDotNet.Artifacts/**"
      - "**/coverage/**"
      - "**/CoverageReport/**"
      # IDE and tool directories
      - "**/.vs/**"
      - "**/.vscode/**"
      - "**/.idea/**"
      - "**/.git/**"
      - "**/.github/**"
      - "**/.agent/**"
      - "**/.codacy/**"
      - "**/.config/**"
      - "**/.clinerules/**"
      - "**/.qodana/**"
      - "**/.sonarlint/**"
      # Other exclusions
      - "**/archive/**"
      - "**/notebooks/**"
      - "**/ndepend/**"
      - "**/*.Designer.cs"
      - "**/*.generated.cs"
      - "**/*.md"
      - "**/*.pine"
      # Exclude Quantower projects
      - "quantower/**"
      # Exclude test and validation files within lib
      - "lib/**/*.Tests.cs"
      - "lib/**/*.Validation.Tests.cs"

  # Inspection exclusions with rationale
  - name: S3776                   # Cognitive Complexity - complex algorithms are intentional
  - name: CA1416                  # Platform compatibility - Quantower targets Windows
  - name: InvalidXmlDocComment
  - name: EnforceIfStatementBraces
  - name: CheckNamespace
  - name: LoopCanBeConvertedToQuery
  - name: UnusedAutoPropertyAccessor.Global
  - name: RedundantArgumentDefaultValue
  - name: RedundantNameQualifier
  - name: InconsistentNaming      # TSeries, TValue, TBar naming convention is intentional
  - name: RedundantLambdaParameterType
  - name: UnusedParameter.Local
  - name: RedundantCast
  - name: RedundantTypeArgumentsOfMethod
  - name: RedundantUsingDirective
  - name: ConditionalAccessQualifierIsNonNullableAccordingToAPIContract
  - name: RedundantAssignment
  - name: MarkdownUnresolvedFileReference
  - name: RCS1037
  - name: CheckTagEmptyBody
  - name: MemberCanBePrivate.Global
  - name: AutoPropertyCanBeMadeGetOnly.Global
  - name: PropertyCanBeMadeInitOnly.Global
  - name: UseCollectionExpression
  - name: UseObjectOrCollectionInitializer
  - name: ForCanBeConvertedToForeach
  - name: UnusedMember.Global
# end of exclusions
