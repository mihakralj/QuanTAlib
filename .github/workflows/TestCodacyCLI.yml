name: Test Codacy CLI v2 Installation

on:
  workflow_dispatch:

jobs:
  Test_Install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Codacy CLI v2
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          set -eo pipefail
          
          if [[ -z "${CODACY_PROJECT_TOKEN:-}" ]]; then
            echo "::error::CODACY_PROJECT_TOKEN is empty or unset!"
            exit 1
          fi
          
          # Install Codacy CLI using official bootstrap script
          echo "Installing Codacy CLI v2..."
          
          # Install Codacy CLI v2 directly to /usr/local/bin
          sudo curl -Ls https://raw.githubusercontent.com/codacy/codacy-cli-v2/main/codacy-cli.sh -o /usr/local/bin/codacy-cli
          sudo chmod +x /usr/local/bin/codacy-cli
          
          echo "Verifying installation..."
          # The script might respond to 'version' differently depending on implementation, 
          # but based on logs it outputs version info.
          codacy-cli version
          
          echo "Run init..."
          codacy-cli init \
            --api-token "$CODACY_PROJECT_TOKEN" \
            --provider gh \
            --organization mihakralj \
            --repository QuanTAlib
            
          echo "Downloading configured tools..."
          codacy-cli download
          
          echo "Installation successful!"
