name: Test Codacy CLI v2 Installation

on:
  workflow_dispatch:

jobs:
  Test_Install:
    runs-on: ubuntu-latest
    steps:
      - name: Install Codacy CLI v2
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          set -euo pipefail
          
          # Install Codacy CLI using official bootstrap script
          echo "Installing Codacy CLI v2..."
          
          # Install Codacy CLI v2 directly to /usr/local/bin
          sudo curl -Ls https://raw.githubusercontent.com/codacy/codacy-cli-v2/main/codacy-cli.sh -o /usr/local/bin/codacy-cli
          sudo chmod +x /usr/local/bin/codacy-cli
          
          echo "Verifying installation..."
          codacy-cli download
          codacy-cli version
          codacy-cli init
          codacy-cli init --api-token "$CODACY_PROJECT_TOKEN" --provider gh --Organization mihakralj --repository QuanTAlib

          
          echo "Installation successful!"
