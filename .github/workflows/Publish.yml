name: Publish Workflow

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      skip_publish:
        description: 'Skip publishing (analysis only)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  DOTNET_VERSION: '10.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ==============================================================================
  # 1. ReSharper InspectCode Scan (replaces Qodana)
  #    Generates SARIF and uploads directly to Codacy
  # ==============================================================================
  ReSharper_Scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Create SARIF output directory
        run: mkdir -p .sarif

      - name: Install JetBrains ReSharper GlobalTools
        run: |
          dotnet tool update --global JetBrains.ReSharper.GlobalTools || \
          dotnet tool install --global JetBrains.ReSharper.GlobalTools
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Run ReSharper InspectCode (SARIF)
        continue-on-error: true
        run: |
          # If you have a custom profile, point to it via --profile
          # (can be a .DotSettings file or a named profile depending on your setup)
          jb inspectcode QuanTAlib.sln \
            --format=sarif \
            --output=.sarif/resharper.sarif \
            --verbosity=WARN || true

          if [ -f ".sarif/resharper.sarif" ]; then
            echo "ReSharper SARIF generated successfully"
            ls -lh .sarif/resharper.sarif
          else
            echo "Warning: ReSharper SARIF not generated"
          fi

      - name: Upload ReSharper SARIF to Codacy
        if: always()
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          if [ -z "$CODACY_PROJECT_TOKEN" ]; then
            echo "CODACY_PROJECT_TOKEN not set. Skipping Codacy upload."
            exit 0
          fi

          if [ ! -f ".sarif/resharper.sarif" ]; then
            echo "No ReSharper SARIF file to upload"
            exit 0
          fi

          echo "Installing Codacy CLI v2..."
          CODACY_CLI_VERSION=$(curl -Ls https://api.github.com/repos/codacy/codacy-cli-v2/releases/latest | grep -m 1 tag_name | cut -d'"' -f4)
          echo "Downloading Codacy CLI v2 version: $CODACY_CLI_VERSION"
          curl -Ls "https://github.com/codacy/codacy-cli-v2/releases/download/${CODACY_CLI_VERSION}/codacy-cli-v2_${CODACY_CLI_VERSION}_linux_amd64.tar.gz" | tar xz
          chmod +x codacy-cli-v2

          echo "Uploading ReSharper SARIF to Codacy..."
          ./codacy-cli-v2 upload \
            -s .sarif/resharper.sarif \
            -c "${{ github.sha }}" \
            -t "$CODACY_PROJECT_TOKEN" \
            -p gh \
            -o mihakralj \
            -r QuanTAlib || echo "Warning: Failed to upload ReSharper SARIF"
        continue-on-error: true

  # ==============================================================================
  # 2. Snyk Scan (runs in parallel - fast ~2-3 min)
  #    Generates SARIF and uploads directly to Codacy
  # ==============================================================================
  Snyk_Scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Snyk CLI
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb # master

      - name: Restore dependencies
        run: dotnet restore

      - name: Create SARIF output directory
        run: mkdir -p .sarif

      - name: Run Snyk Security Scan
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --all-projects --sarif-file-output=.sarif/snyk.sarif || true
          if [ -f ".sarif/snyk.sarif" ]; then
            echo "Snyk SARIF generated successfully"
            ls -lh .sarif/snyk.sarif
          else
            echo "Warning: Snyk SARIF not generated"
          fi

      - name: Upload Snyk SARIF to Codacy
        if: always()
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          if [ -z "$CODACY_PROJECT_TOKEN" ]; then
            echo "CODACY_PROJECT_TOKEN not set. Skipping Codacy upload."
            exit 0
          fi

          if [ ! -f ".sarif/snyk.sarif" ]; then
            echo "No Snyk SARIF file to upload"
            exit 0
          fi

          echo "Installing Codacy CLI v2..."
          CODACY_CLI_VERSION=$(curl -Ls https://api.github.com/repos/codacy/codacy-cli-v2/releases/latest | grep -m 1 tag_name | cut -d'"' -f4)
          echo "Downloading Codacy CLI v2 version: $CODACY_CLI_VERSION"
          curl -Ls "https://github.com/codacy/codacy-cli-v2/releases/download/${CODACY_CLI_VERSION}/codacy-cli-v2_${CODACY_CLI_VERSION}_linux_amd64.tar.gz" | tar xz
          chmod +x codacy-cli-v2

          echo "Uploading Snyk SARIF to Codacy..."
          ./codacy-cli-v2 upload \
            -s .sarif/snyk.sarif \
            -c "${{ github.sha }}" \
            -t "$CODACY_PROJECT_TOKEN" \
            -p gh \
            -o mihakralj \
            -r QuanTAlib || echo "Warning: Failed to upload Snyk SARIF"
        continue-on-error: true

  # ==============================================================================
  # 3. Build, Test, Coverage & SonarCloud (runs in parallel)
  #    - Builds with Roslyn analyzers → SARIF → Codacy
  #    - Runs tests with coverage
  #    - Sends coverage to SonarCloud (OpenCover format)
  #    - Uploads Roslyn SARIF to Codacy
  # ==============================================================================
  Build_Test_Coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set up JDK 17 (for SonarCloud)
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install Tools
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          dotnet tool install --global dotnet-sonarscanner --version 9.0.0
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore dependencies
        run: dotnet restore

      - name: Begin SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "WARNING: SONAR_TOKEN is not set. Skipping SonarCloud."
            echo "SKIP_SONAR=true" >> $GITHUB_ENV
            exit 0
          fi
          
          dotnet sonarscanner begin /k:mihakralj_QuanTAlib /o:mihakralj-quantalib \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="coverage-merged/OpenCover.xml" \
            /d:sonar.coverage.exclusions="**Tests.cs,**/*.md,**/*.html,**/*.css,**/docs/**/*,**/archive/**/*,**/notebooks/**/*,**/obj/**/*,**/bin/**/*" \
            /d:sonar.exclusions="**/TestResults/**/*,**/bin/**/*,**/obj/**/*,**/*.html,**/coverage/**/*,**/CoverageReport/**/*,**/*.md,**/*.css,**/docs/**/*,**/archive/**/*,**/notebooks/**/*" \
            /d:sonar.test.exclusions="**Tests.cs,**/obj/**/*,**/bin/**/*" \
            /d:sonar.scanner.scanAll="false"

      - name: Build Solution (Roslyn generates SARIF)
        run: |
          mkdir -p .sarif
          # Build entire solution - SonarScanner instruments this build
          # Each project generates its own SARIF via Directory.Build.props
          dotnet build QuanTAlib.sln --no-restore --configuration Debug

      - name: Verify Roslyn SARIF Generation
        run: |
          echo "=== Roslyn SARIF Report ==="
          if [ -d ".sarif" ] && [ "$(ls -A .sarif/*.sarif 2>/dev/null)" ]; then
            echo "SARIF files generated:"
            ls -lh .sarif/*.sarif
          else
            echo "Warning: No SARIF files found in .sarif directory"
            find . -name "*.sarif" -type f 2>/dev/null || echo "No SARIF files found anywhere"
          fi

      - name: Run Tests with Coverage
        run: |
          # Run ALL tests in solution - automatically discovers test projects
          dotnet test QuanTAlib.sln --no-build --configuration Debug \
            --collect:"XPlat Code Coverage;Format=opencover,cobertura,lcov" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=test_results.trx"

      - name: Merge Coverage Reports
        run: |
          mkdir -p coverage-merged
          
          echo "=== Coverage files before merge ==="
          find TestResults -name "coverage.*" -o -name "*.info" 2>/dev/null || echo "No coverage files found yet"
          
          # Merge all coverage formats into unified reports
          reportgenerator \
            "-reports:TestResults/**/coverage.opencover.xml;TestResults/**/coverage.cobertura.xml;TestResults/**/coverage.info" \
            "-targetdir:coverage-merged" \
            "-reporttypes:OpenCover;Cobertura;lcov"
          
          echo "=== Merged coverage files ==="
          ls -lh coverage-merged/
          
          # Verify OpenCover.xml exists for SonarCloud
          if [ -f "coverage-merged/OpenCover.xml" ]; then
            echo "✓ OpenCover.xml ready for SonarCloud"
          else
            echo "✗ Warning: OpenCover.xml not generated"
          fi

      - name: End SonarCloud Analysis
        if: env.SKIP_SONAR != 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Export SonarCloud findings to SARIF
        if: env.SKIP_SONAR != 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          pip install sonar-tools
          sonar-findings-export \
            -u https://sonarcloud.io \
            -t "$SONAR_TOKEN" \
            -o mihakralj-quantalib \
            --project mihakralj_QuanTAlib \
            --branch "${{ github.ref_name }}" \
            --format sarif \
            --output .sarif/sonarcloud.sarif || echo "Warning: Failed to export SonarCloud SARIF"
          
          if [ -f ".sarif/sonarcloud.sarif" ]; then
            echo "SonarCloud SARIF exported successfully"
            ls -lh .sarif/sonarcloud.sarif
          fi
        continue-on-error: true

      - name: Upload SonarCloud SARIF to GitHub Code Scanning
        if: env.SKIP_SONAR != 'true' && always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .sarif/sonarcloud.sarif
          category: sonarcloud
        continue-on-error: true

      - name: Upload All Roslyn SARIF files to Codacy
        if: always()
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          if [ -z "$CODACY_PROJECT_TOKEN" ]; then
            echo "CODACY_PROJECT_TOKEN not set. Skipping Codacy upload."
            exit 0
          fi

          # Check if there are any SARIF files
          if [ ! -d ".sarif" ] || [ -z "$(ls -A .sarif/*.sarif 2>/dev/null)" ]; then
            echo "No Roslyn SARIF files to upload"
            exit 0
          fi

          echo "Installing Codacy CLI v2..."
          CODACY_CLI_VERSION=$(curl -Ls https://api.github.com/repos/codacy/codacy-cli-v2/releases/latest | grep -m 1 tag_name | cut -d'"' -f4)
          echo "Downloading Codacy CLI v2 version: $CODACY_CLI_VERSION"
          curl -Ls "https://github.com/codacy/codacy-cli-v2/releases/download/${CODACY_CLI_VERSION}/codacy-cli-v2_${CODACY_CLI_VERSION}_linux_amd64.tar.gz" | tar xz
          chmod +x codacy-cli-v2

          # Upload each SARIF file to Codacy
          echo "=== Uploading all Roslyn SARIF files to Codacy ==="
          for sarif_file in .sarif/*.sarif; do
            if [ -f "$sarif_file" ]; then
              filename=$(basename "$sarif_file" .sarif)
              echo "Uploading $sarif_file (project: $filename)..."
              ./codacy-cli-v2 upload \
                -s "$sarif_file" \
                -c "${{ github.sha }}" \
                -t "$CODACY_PROJECT_TOKEN" \
                -p gh \
                -o mihakralj \
                -r QuanTAlib || echo "Warning: Failed to upload $sarif_file"
            fi
          done
          echo "=== SARIF upload complete ==="
        continue-on-error: true

      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage-merged/

  # ==============================================================================
  # 4. Codacy Coverage Upload (needs coverage from Build_Test_Coverage)
  #    Uploads Cobertura format to Codacy
  # ==============================================================================
  Codacy_Coverage_Upload:
    needs: Build_Test_Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Coverage Reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: coverage-merged

      - name: Upload Coverage to Codacy
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          if [ -z "$CODACY_PROJECT_TOKEN" ]; then
            echo "CODACY_PROJECT_TOKEN is not set. Skipping upload."
            exit 0
          fi

          # Download the reporter script
          curl -Ls https://coverage.codacy.com/get.sh -o codacy.sh
          chmod +x codacy.sh

          # Upload Cobertura coverage to Codacy
          if [ -f "coverage-merged/Cobertura.xml" ]; then
            echo "Uploading Cobertura coverage to Codacy..."
            ./codacy.sh report -r "coverage-merged/Cobertura.xml"
          else
            echo "Warning: Cobertura.xml not found"
            ls -la coverage-merged/
          fi
        continue-on-error: true

  # ==============================================================================
  # 5. Publish Package (only needs Build_Test_Coverage)
  #    Does not wait for security scans - they run in parallel
  # ==============================================================================
  Publish_Package:
    needs: Build_Test_Coverage
    if: >-
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || endsWith(github.ref, '-dev'))) ||
      (github.event_name == 'workflow_dispatch' && !inputs.skip_publish)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.2.0
        with:
          versionSpec: '6.x'
          includePrerelease: true

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.2.0
        with:
          updateAssemblyInfo: false

      - name: Build & Pack
        run: |
          dotnet restore
          dotnet build ./lib/quantalib.csproj --configuration Release --nologo
          dotnet build ./quantower/Momentum.csproj --configuration Release --nologo
          dotnet build ./quantower/Trends.csproj --configuration Release --nologo
          dotnet build ./quantower/Volume.csproj --configuration Release --nologo

      - name: Create Development Release
        if: github.ref == 'refs/heads/dev' || endsWith(github.ref, '-dev')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete development --yes || true
          gh release create development \
            --title "Development Build" \
            --notes "Latest development build from commit ${{ github.sha }}" \
            --prerelease \
            --target ${{ github.sha }} \
            lib/bin/Release/net10.0/QuanTAlib.dll \
            quantower/bin/Release/Momentum.dll \
            quantower/bin/Release/Trends.dll \
            quantower/bin/Release/Volume.dll

      - name: Push to MyGet
        if: github.ref == 'refs/heads/dev' || endsWith(github.ref, '-dev')
        continue-on-error: true
        run: |
          dotnet nuget push 'lib/bin/Release/QuanTAlib.*.nupkg' \
            --source https://www.myget.org/F/quantalib/api/v3/index.json \
            --force-english-output \
            --api-key ${{ secrets.MYGET_DEPLOY_KEY_QUANTALIB }}

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v${{ steps.gitversion.outputs.MajorMinorPatch }} \
            --title "Release from commit ${{ steps.gitversion.outputs.MajorMinorPatch }}" \
            --notes "Release notes for this version." \
            quantower/bin/Release/Momentum.dll \
            quantower/bin/Release/Trends.dll \
            quantower/bin/Release/Volume.dll

      - name: Push to NuGet
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          dotnet nuget push 'lib/bin/Release/QuanTAlib.*.nupkg' \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate \
            --api-key ${{ secrets.NUGET_DEPLOY_KEY_QUANTLIB }}
