name: Publish Workflow

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      skip_publish:
        description: 'Skip publishing (analysis only)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  DOTNET_VERSION: '10.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ==============================================================================
  # 1. Build, Test, Coverage & SonarCloud (Single Job for Path Consistency)
  # ==============================================================================
  Build_Test_Coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install ReportGenerator
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Install SonarScanner
        run: |
          dotnet tool install --global dotnet-sonarscanner --version 9.0.0
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore dependencies
        run: dotnet restore

      - name: Begin SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "WARNING: SONAR_TOKEN is not set. Skipping SonarCloud."
            echo "SKIP_SONAR=true" >> $GITHUB_ENV
            exit 0
          fi
          
          dotnet sonarscanner begin /k:mihakralj_QuanTAlib /o:mihakralj-quantalib \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="coverage-merged/OpenCover.xml" \
            /d:sonar.coverage.exclusions="**Tests.cs,**/*.md,**/*.html,**/*.css,**/docs/**/*,**/archive/**/*,**/notebooks/**/*,**/obj/**/*,**/bin/**/*" \
            /d:sonar.exclusions="**/TestResults/**/*,**/bin/**/*,**/obj/**/*,**/*.html,**/coverage/**/*,**/CoverageReport/**/*,**/*.md,**/*.css,**/docs/**/*,**/archive/**/*,**/notebooks/**/*" \
            /d:sonar.test.exclusions="**Tests.cs,**/obj/**/*,**/bin/**/*" \
            /d:sonar.scanner.scanAll="false"

      - name: Build
        run: dotnet build --no-restore --configuration Debug

      - name: Collect SARIF Files
        run: |
          mkdir -p sarif-reports
          # Copy SARIF files from .sarif directory (generated by Roslyn analyzers)
          if [ -d ".sarif" ]; then
            for file in .sarif/*.json; do
              if [ -f "$file" ]; then
                # Get project name from filename and rename to .sarif extension
                basename=$(basename "$file" .json)
                cp "$file" "sarif-reports/${basename}.sarif"
              fi
            done
          fi
          echo "=== SARIF files collected ==="
          ls -la sarif-reports/

      - name: Upload SARIF Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sarif-reports
          path: sarif-reports/

      - name: Upload Roslyn SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-reports/
          category: roslyn-analyzers
        continue-on-error: true

      - name: Run Tests with Coverage (OpenCover/Cobertura/LCOV)
        run: |
          dotnet test --no-build --configuration Debug \
            --collect:"XPlat Code Coverage;Format=opencover,cobertura,lcov" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=test_results.trx"

      - name: Merge Coverage Reports
        run: |
          mkdir -p coverage-merged
          
          echo "=== Coverage files before merge ==="
          find TestResults -name "coverage.*" -o -name "*.info"
          
          # Merge all coverage formats into single unified reports
          reportgenerator \
            "-reports:TestResults/**/coverage.opencover.xml;TestResults/**/coverage.cobertura.xml;TestResults/**/coverage.info" \
            "-targetdir:coverage-merged" \
            "-reporttypes:OpenCover;Cobertura;lcov"
          
          echo "=== Merged coverage files ==="
          ls -lh coverage-merged/

      - name: End SonarCloud Analysis
        if: env.SKIP_SONAR != 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Prepare Coverage Artifacts
        run: |
          # Create directories for different consumers
          mkdir -p coverage-opencover
          mkdir -p coverage-cobertura
          mkdir -p coverage-lcov
          
          # Copy merged reports
          cp coverage-merged/OpenCover.xml coverage-opencover/ 2>/dev/null || echo "No OpenCover.xml"
          cp coverage-merged/Cobertura.xml coverage-cobertura/ 2>/dev/null || echo "No Cobertura.xml"
          
          # LCOV: ReportGenerator outputs as lowercase 'lcov.info'
          if [ -f "coverage-merged/lcov.info" ]; then
            cp coverage-merged/lcov.info coverage-lcov/coverage.lcov
            echo "LCOV coverage prepared for Qodana"
            ls -lh coverage-lcov/
          else
            echo "Warning: lcov.info not found after merge"
            echo "Files in coverage-merged:"
            ls -la coverage-merged/
            echo "No LCOV coverage available" > coverage-lcov/README.txt
          fi

      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage-merged/

      - name: Upload LCOV Coverage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage-lcov/

  # ==============================================================================
  # 2. Qodana Scan
  # ==============================================================================
  Qodana_Scan:
    needs: Build_Test_Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
      security-events: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download LCOV Coverage
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: coverage-lcov
          path: .qodana/code-coverage

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.3
        continue-on-error: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          args: --config,qodana.yaml,--coverage-dir,.qodana/code-coverage,--fail-threshold,999999

      - name: Upload Qodana SARIF Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qodana-sarif-reports
          path: ${{ runner.temp }}/qodana/results/qodana.sarif.json

      - name: Upload Qodana SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json
          category: qodana
        continue-on-error: true

  # ==============================================================================
  # 3. Codacy Qodana SARIF Upload
  # ==============================================================================
  Codacy_Qodana_Upload:
    needs: Qodana_Scan
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Qodana SARIF Reports
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: qodana-sarif-reports
          path: qodana-sarif

      - name: Upload Qodana SARIF to Codacy
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          if [ -z "$CODACY_PROJECT_TOKEN" ]; then
            echo "CODACY_PROJECT_TOKEN is not set. Skipping upload."
            exit 0
          fi

          echo "Installing Codacy Analysis CLI..."
          curl -L https://github.com/codacy/codacy-analysis-cli/releases/latest/download/codacy-analysis-cli-linux -o codacy-analysis-cli
          chmod +x codacy-analysis-cli

          # Upload Qodana SARIF
          if [ -f "qodana-sarif/qodana.sarif.json" ]; then
            echo "Uploading Qodana SARIF report..."
            ./codacy-analysis-cli upload-results \
              --provider gh \
              --owner mihakralj \
              --repository QuanTAlib \
              --commit ${{ github.sha }} \
              --upload-batch-size 50000 \
              --tool qodana \
              --results-file qodana-sarif/qodana.sarif.json || echo "Warning: Failed to upload Qodana SARIF"
          else
            echo "Warning: Qodana SARIF file not found"
          fi
        continue-on-error: true

  # ==============================================================================
  # 4. Codacy Coverage Upload
  # ==============================================================================
  Codacy_Coverage_Upload:
    needs: Build_Test_Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Merged Coverage Reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: coverage-merged

      - name: Upload Coverage to Codacy
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          if [ -z "$CODACY_PROJECT_TOKEN" ]; then
            echo "CODACY_PROJECT_TOKEN is not set. Skipping upload."
            exit 0
          fi

          # Download the reporter script
          curl -Ls https://coverage.codacy.com/get.sh -o codacy.sh
          chmod +x codacy.sh

          # Upload merged Cobertura file
          if [ -f "coverage-merged/Cobertura.xml" ]; then
            echo "Uploading merged Cobertura coverage..."
            ./codacy.sh report -r "coverage-merged/Cobertura.xml"
          else
            echo "Warning: Cobertura.xml not found"
          fi
        continue-on-error: true

  # ==============================================================================
  # 5. Codacy SARIF Upload
  # ==============================================================================
  Codacy_SARIF_Upload:
    needs: Build_Test_Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download SARIF Reports
        uses: actions/download-artifact@v4
        with:
          name: sarif-reports
          path: sarif-reports

      - name: Upload SARIF to Codacy
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          if [ -z "$CODACY_PROJECT_TOKEN" ]; then
            echo "CODACY_PROJECT_TOKEN is not set. Skipping upload."
            exit 0
          fi

          echo "Installing Codacy Analysis CLI..."
          curl -L https://github.com/codacy/codacy-analysis-cli/releases/latest/download/codacy-analysis-cli-linux -o codacy-analysis-cli
          chmod +x codacy-analysis-cli

          # Upload each SARIF file
          for file in sarif-reports/*.sarif; do
            if [ -f "$file" ]; then
              echo "Uploading SARIF: $file"
              ./codacy-analysis-cli upload-results \
                --provider gh \
                --owner mihakralj \
                --repository QuanTAlib \
                --commit ${{ github.sha }} \
                --upload-batch-size 50000 \
                --tool roslyn \
                --results-file "$file" || echo "Warning: Failed to upload $file"
            fi
          done
        continue-on-error: true

  # ==============================================================================
  # 6. Snyk Scan
  # ==============================================================================
  Snyk_Scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Snyk CLI
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb # master

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Snyk on Solution
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --all-projects

  # ==============================================================================
  # 7. CodeQL Analysis
  # ==============================================================================
  CodeQL_Analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'csharp'
          queries: security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build
        run: dotnet build --configuration Debug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          output: results
          upload: true

  # ==============================================================================
  # 8. Publish Package
  # ==============================================================================
  Publish_Package:
    needs: [Build_Test_Coverage, Qodana_Scan, Codacy_Qodana_Upload, Codacy_Coverage_Upload, Codacy_SARIF_Upload, Snyk_Scan, CodeQL_Analysis]
    if: >-
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || endsWith(github.ref, '-dev'))) ||
      (github.event_name == 'workflow_dispatch' && !inputs.skip_publish)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.2.0
        with:
          versionSpec: '6.x'
          includePrerelease: true

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.2.0
        with:
          updateAssemblyInfo: false

      - name: Build & Pack
        run: |
          dotnet restore
          dotnet build ./lib/quantalib.csproj --configuration Release --nologo
          dotnet build ./quantower/Momentum.csproj --configuration Release --nologo
          dotnet build ./quantower/Trends.csproj --configuration Release --nologo
          dotnet build ./quantower/Volume.csproj --configuration Release --nologo

      - name: Create Development Release
        if: github.ref == 'refs/heads/dev' || endsWith(github.ref, '-dev')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete development --yes || true
          gh release create development \
            --title "Development Build" \
            --notes "Latest development build from commit ${{ github.sha }}" \
            --prerelease \
            --target ${{ github.sha }} \
            lib/bin/Release/net10.0/QuanTAlib.dll \
            quantower/bin/Release/Momentum.dll \
            quantower/bin/Release/Trends.dll \
            quantower/bin/Release/Volume.dll

      - name: Push to MyGet
        if: github.ref == 'refs/heads/dev' || endsWith(github.ref, '-dev')
        continue-on-error: true
        run: |
          dotnet nuget push 'lib/bin/Release/QuanTAlib.*.nupkg' \
            --source https://www.myget.org/F/quantalib/api/v3/index.json \
            --force-english-output \
            --api-key ${{ secrets.MYGET_DEPLOY_KEY_QUANTALIB }}

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v${{ steps.gitversion.outputs.MajorMinorPatch }} \
            --title "Release from commit ${{ steps.gitversion.outputs.MajorMinorPatch }}" \
            --notes "Release notes for this version." \
            quantower/bin/Release/Momentum.dll \
            quantower/bin/Release/Trends.dll \
            quantower/bin/Release/Volume.dll

      - name: Push to NuGet
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          dotnet nuget push 'lib/bin/Release/QuanTAlib.*.nupkg' \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate \
            --api-key ${{ secrets.NUGET_DEPLOY_KEY_QUANTLIB }}
