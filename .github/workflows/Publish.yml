name: Publish Workflow

on:
  push:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  workflow_dispatch:
    inputs:
      skip_publish:
        description: "Skip publishing (analysis only)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

defaults:
  run:
    shell: bash

env:
  DOTNET_VERSION: "10.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

  # IMPORTANT: analyze the same commit we report to Codacy
  CHECKOUT_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
  COMMIT_UUID:  ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

jobs:
  # ==============================================================================
  # 1) ReSharper InspectCode -> SARIF artifact
  # ==============================================================================
  ReSharper_Analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.CHECKOUT_REF }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj
            **/*.sln

      - name: Prepare SARIF directory
        run: mkdir -p .sarif

      - name: Install JetBrains ReSharper GlobalTools
        run: |
          dotnet tool update --global JetBrains.ReSharper.GlobalTools || \
          dotnet tool install --global JetBrains.ReSharper.GlobalTools
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Run ReSharper InspectCode (SARIF)
        run: |
          set +e
          jb inspectcode QuanTAlib.sln \
            --format=sarif \
            --output=.sarif/resharper.sarif
          rc=$?
          set -e

          # jb may return non-zero for findings/config; missing SARIF is the real failure signal
          if [ ! -f ".sarif/resharper.sarif" ]; then
            echo "ERROR: ReSharper SARIF not generated (exit code: $rc)"
            exit 1
          fi

          echo "ReSharper SARIF generated (exit code: $rc)"
          ls -lh .sarif/resharper.sarif

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: sarif-resharper
          path: .sarif/resharper.sarif
          retention-days: 7

  # ==============================================================================
  # 2) Snyk Security Scan -> SARIF artifact
  # ==============================================================================
  Snyk_Scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.CHECKOUT_REF }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj
            **/*.sln

      - name: Install Snyk CLI
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      - name: Restore dependencies
        run: dotnet restore

      - name: Prepare SARIF directory
        run: mkdir -p .sarif

      - name: Run Snyk Security Scan (SARIF)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "SNYK_TOKEN not set. Skipping Snyk scan."
            exit 0
          fi

          set +e
          snyk test --all-projects --sarif-file-output=.sarif/snyk.sarif
          rc=$?
          set -e

          # Snyk exit codes: 0 = no issues, 1 = issues found, >1 = error
          if [ $rc -gt 1 ]; then
            echo "ERROR: Snyk scan failed (exit code: $rc)"
            exit $rc
          fi

          if [ ! -f ".sarif/snyk.sarif" ]; then
            echo "ERROR: Snyk SARIF not generated"
            exit 1
          fi

          echo "Snyk SARIF generated (exit code: $rc)"
          ls -lh .sarif/snyk.sarif

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-snyk
          path: .sarif/snyk.sarif
          retention-days: 7
          if-no-files-found: warn

  # ==============================================================================
  # 3) Build, Test, Coverage, SonarCloud & Roslyn SARIF
  # ==============================================================================
  Sonar_Analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.CHECKOUT_REF }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj
            **/*.sln

      - name: Set up JDK 17 (for SonarCloud)
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Install Tools
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          dotnet tool install --global dotnet-sonarscanner
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Restore dependencies
        run: dotnet restore

      - name: Check for SonarCloud token
        id: check_sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "${SONAR_TOKEN:-}" ]; then
            echo "SONAR_TOKEN not set. Skipping SonarCloud."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Begin SonarCloud Analysis
        if: steps.check_sonar.outputs.skip != 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:mihakralj_QuanTAlib \
            /o:mihakralj-quantalib \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="coverage-merged/OpenCover.xml" \
            /d:sonar.coverage.exclusions="**Tests.cs,**/*.md,**/*.html,**/*.css,**/docs/**/*,**/archive/**/*,**/notebooks/**/*,**/obj/**/*,**/bin/**/*" \
            /d:sonar.exclusions="**/TestResults/**/*,**/bin/**/*,**/obj/**/*,**/*.html,**/coverage/**/*,**/CoverageReport/**/*,**/*.md,**/*.css,**/docs/**/*,**/archive/**/*,**/notebooks/**/*" \
            /d:sonar.test.exclusions="**Tests.cs,**/obj/**/*,**/bin/**/*" \
            /d:sonar.scanner.scanAll="false"

      - name: Prepare SARIF directory
        run: mkdir -p .sarif

      - name: Build Solution with Roslyn SARIF
        run: |
          dotnet build QuanTAlib.sln \
            --no-restore \
            --configuration Debug \
            --nologo \
            -p:TreatWarningsAsErrors=false \
            -p:ErrorLog="$(pwd)/.sarif/roslyn.sarif;version=2.1"

      - name: Run Tests with Coverage
        run: |
          dotnet test QuanTAlib.sln \
            --no-build \
            --configuration Debug \
            --collect:"XPlat Code Coverage;Format=opencover,cobertura,lcov" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=test_results.trx"

      - name: Merge Coverage Reports
        run: |
          mkdir -p coverage-merged

          reportgenerator \
            "-reports:TestResults/**/coverage.opencover.xml;TestResults/**/coverage.cobertura.xml;TestResults/**/coverage.info" \
            "-targetdir:coverage-merged" \
            "-reporttypes:OpenCover;Cobertura;lcov"

          echo "Merged coverage outputs:"
          ls -la coverage-merged || true

          if [ ! -f "coverage-merged/OpenCover.xml" ]; then
            echo "WARNING: OpenCover.xml not generated (Sonar coverage may be missing)"
          fi

      - name: End SonarCloud Analysis
        if: env.SKIP_SONAR != 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Export SonarCloud findings to SARIF
        if: env.SKIP_SONAR != 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "Installing sonar-tools..."
          pip install --quiet sonar-tools

          echo "Exporting SonarCloud findings to SARIF format..."
          mkdir -p .sarif
          
          # Export findings from SonarCloud to SARIF
          # -u: SonarCloud URL
          # -t: Token
          # -o: Organization
          # --format sarif: Output format
          # -k: Project key
          sonar-findings-export \
            -u "https://sonarcloud.io" \
            -t "$SONAR_TOKEN" \
            -o "mihakralj-quantalib" \
            -k "mihakralj_QuanTAlib" \
            --format sarif \
            -f ".sarif/sonarcloud.sarif" \
            || echo "Warning: SonarCloud SARIF export failed (findings may not be available yet)"
          
          if [ -f ".sarif/sonarcloud.sarif" ]; then
            echo "SonarCloud SARIF exported successfully:"
            ls -lh .sarif/sonarcloud.sarif
          fi

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage-merged/
          retention-days: 7

      - name: Upload Roslyn SARIF Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-roslyn
          path: .sarif/roslyn.sarif
          retention-days: 7
          if-no-files-found: warn

      - name: Upload SonarCloud SARIF Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-sonarcloud
          path: .sarif/sonarcloud.sarif
          retention-days: 7
          if-no-files-found: warn

  # ==============================================================================
  # 4) Codacy SARIF Upload (Codacy ingests; Codacy does NOT run tools)
  # ==============================================================================
  Codacy_SARIF_Upload:
    needs: [ReSharper_Analysis, Snyk_Scan, Sonar_Analysis]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    if: always()
    env:
      # Pin script ref + binary version for reproducibility
      CODACY_CLI_V2_SCRIPT_REF: "0.1.0-main.84.d83aad7"
      CODACY_CLI_V2_VERSION: "0.1.0-main.84.d83aad7"
    steps:
      - name: Check for Codacy token
        id: check_token
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          if [ -z "${CODACY_PROJECT_TOKEN:-}" ]; then
            echo "CODACY_PROJECT_TOKEN not set. Skipping Codacy uploads."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download SARIF artifacts
        if: steps.check_token.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: sarif-*
          path: sarif
          merge-multiple: true

      - name: List SARIF files
        if: steps.check_token.outputs.skip != 'true'
        run: |
          echo "SARIF files:"
          find sarif -name "*.sarif" -type f -maxdepth 4 -print -exec ls -lh {} \; || true

      - name: Cache Codacy CLI v2
        if: steps.check_token.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/codacy/codacy-cli-v2
          key: codacy-cli-v2-${{ env.CODACY_CLI_V2_VERSION }}

      - name: Download Codacy CLI v2 script (pinned)
        if: steps.check_token.outputs.skip != 'true'
        run: |
          set -euo pipefail
          curl -Ls "https://raw.githubusercontent.com/codacy/codacy-cli-v2/${CODACY_CLI_V2_SCRIPT_REF}/codacy-cli.sh" -o /tmp/codacy-cli.sh
          chmod +x /tmp/codacy-cli.sh

      - name: Upload SARIF files to Codacy
        if: steps.check_token.outputs.skip != 'true'
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          set -euo pipefail

          shopt -s nullglob globstar
          files=(sarif/**/*.sarif)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No SARIF files found. Nothing to upload."
            exit 0
          fi

          echo "Uploading ${#files[@]} SARIF file(s) to Codacy with commit: ${COMMIT_UUID}"
          for sarif_file in "${files[@]}"; do
            echo "--- Uploading: $sarif_file ---"
            CODACY_CLI_V2_VERSION="${CODACY_CLI_V2_VERSION}" \
            /tmp/codacy-cli.sh upload \
              -s "$sarif_file" \
              -c "$COMMIT_UUID" \
              -t "$CODACY_PROJECT_TOKEN" \
              || echo "WARNING: failed to upload $sarif_file"
          done

  # ==============================================================================
  # 5) Codacy Coverage Upload (Codacy ingests; Codacy does NOT run tools)
  # ==============================================================================
  Codacy_Coverage_Upload:
    needs: Sonar_Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    if: always()
    steps:
      - name: Check for Codacy token
        id: check_token
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          if [ -z "${CODACY_PROJECT_TOKEN:-}" ]; then
            echo "CODACY_PROJECT_TOKEN not set. Skipping coverage upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Coverage Reports
        if: steps.check_token.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: coverage-merged

      - name: Upload Coverage to Codacy
        if: steps.check_token.outputs.skip != 'true'
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          set -euo pipefail

          curl -Ls https://coverage.codacy.com/get.sh -o codacy-coverage.sh
          chmod +x codacy-coverage.sh

          if [ -f "coverage-merged/Cobertura.xml" ]; then
            ./codacy-coverage.sh report -r "coverage-merged/Cobertura.xml"
          else
            echo "Cobertura.xml not found. Available files:"
            ls -la coverage-merged || true
          fi

  # ==============================================================================
  # 6) Publish Package
  # ==============================================================================
  Publish_Package:
    needs: [Sonar_Analysis, ReSharper_Analysis, Snyk_Scan]
    if: >-
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || endsWith(github.ref, '-dev'))) ||
      (github.event_name == 'workflow_dispatch' && !inputs.skip_publish)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.CHECKOUT_REF }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj
            **/*.sln

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.2.0
        with:
          versionSpec: "6.x"
          includePrerelease: true

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.2.0
        with:
          updateAssemblyInfo: false

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: |
          dotnet build ./lib/quantalib.csproj --configuration Release --no-restore --nologo
          dotnet build ./quantower/Momentum.csproj --configuration Release --no-restore --nologo
          dotnet build ./quantower/Trends.csproj --configuration Release --no-restore --nologo
          dotnet build ./quantower/Volume.csproj --configuration Release --no-restore --nologo

      - name: Pack NuGet
        run: |
          dotnet pack ./lib/quantalib.csproj \
            --configuration Release \
            --no-build \
            -p:ContinuousIntegrationBuild=true \
            -p:PackageVersion=${{ steps.gitversion.outputs.SemVer }}

          ls -lh lib/bin/Release/*.nupkg || true

      - name: Create Development Release
        if: github.ref == 'refs/heads/dev' || endsWith(github.ref, '-dev')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete development --yes 2>/dev/null || true
          git push --delete origin refs/tags/development 2>/dev/null || true

          gh release create development \
            --title "Development Build" \
            --notes "Latest development build from commit ${{ github.sha }}" \
            --prerelease \
            --target ${{ github.sha }} \
            lib/bin/Release/*.nupkg \
            lib/bin/Release/**/QuanTAlib.dll \
            quantower/bin/Release/**/*.dll

      - name: Push to MyGet
        if: github.ref == 'refs/heads/dev' || endsWith(github.ref, '-dev')
        continue-on-error: true
        env:
          MYGET_API_KEY: ${{ secrets.MYGET_DEPLOY_KEY_QUANTALIB }}
        run: |
          if [ -z "${MYGET_API_KEY:-}" ]; then
            echo "MYGET_DEPLOY_KEY_QUANTALIB not set. Skipping."
            exit 0
          fi

          dotnet nuget push 'lib/bin/Release/*.nupkg' \
            --source https://www.myget.org/F/quantalib/api/v3/index.json \
            --skip-duplicate \
            --api-key "$MYGET_API_KEY"

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.gitversion.outputs.MajorMinorPatch }}" \
            --title "Release ${{ steps.gitversion.outputs.MajorMinorPatch }}" \
            --generate-notes \
            lib/bin/Release/*.nupkg \
            quantower/bin/Release/**/*.dll

      - name: Push to NuGet
        if: github.ref == 'refs/heads/main'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_DEPLOY_KEY_QUANTLIB }}
        run: |
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "NUGET_DEPLOY_KEY_QUANTLIB not set. Failing publish."
            exit 1
          fi

          dotnet nuget push 'lib/bin/Release/*.nupkg' \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate \
            --api-key "$NUGET_API_KEY"
