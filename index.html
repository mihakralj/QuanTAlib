<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuanTAlib Docs - Dark Theme</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Quantitative Technical Analysis Library in C#">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/dark.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      background-color: #0d1117 !important;
      color: #c9d1d9 !important;
    }

    .app-name-link {
      color: #c9d1d9 !important;
      font-weight: 600;
      font-size: 1.5em;
    }

    .sidebar {
      background-color: #010409 !important;
      border-right: 1px solid #30363d !important;
    }

    .sidebar-nav {
      color: #c9d1d9 !important;
    }

    .sidebar-nav li {
      margin: 0;
    }
    
    .sidebar-nav ul {
      padding-left: 0;
    }

    .sidebar-nav > ul > li {
      font-weight: 600;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      color: #c9d1d9 !important;
    }

    .sidebar-nav a {
      color: #58a6ff !important;
      text-decoration: none;
    }

    .sidebar-nav a:hover {
      text-decoration: underline;
    }

    .content {
      background-color: #0d1117 !important;
    }

    .markdown-section {
      max-width: none;
      margin: 0;
      padding: 8px 16px;
      color: #c9d1d9 !important;
    }

    .markdown-section h1, 
    .markdown-section h2, 
    .markdown-section h3,
    .markdown-section h4,
    .markdown-section h5,
    .markdown-section h6 {
      color: #c9d1d9 !important;
      font-weight: 600;
    }

    .markdown-section h1 {
      border-bottom: 1px solid #21262d;
      padding-bottom: 0.3em;
    }

    .markdown-section h2 {
      border-bottom: 1px solid #21262d;
      padding-bottom: 0.3em;
    }

    .markdown-section p,
    .markdown-section ul,
    .markdown-section ol,
    .markdown-section li {
      color: #c9d1d9 !important;
    }

    .markdown-section strong {
      color: #e8d888 !important;
      font-weight: 700;
    }

    .markdown-section code {
      color: #ffffff !important;
      background-color: rgba(110,118,129,0.4) !important;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      font-size: 85%;
      padding: 0.2em 0.4em;
    }

    .markdown-section pre {
      background-color: #161b22 !important;
      border-radius: 6px;
      border: 1px solid #30363d;
    }

    .markdown-section pre > code {
      color: #c9d1d9 !important;
      background-color: transparent !important;
      padding: 0;
      font-size: 85%;
    }

    .markdown-section a {
      color: #4493f8 !important;
      text-decoration: none;
    }

    .markdown-section a:hover {
      text-decoration: underline;
    }

    .markdown-section table {
      display: block;
      width: 100%;
      overflow: auto;
      border-spacing: 0;
      border-collapse: collapse;
    }

    .markdown-section table tr {
      background-color: #0d1117 !important;
      border-top: 1px solid #30363d;
    }

    .markdown-section table tr:nth-child(2n) {
      background-color: #161b22 !important;
    }

    .markdown-section table th, 
    .markdown-section table td {
      padding: 6px 13px;
      border: 1px solid #30363d;
      color: #c9d1d9 !important;
    }

    .markdown-section table th {
      font-weight: 600;
      background-color: #161b22 !important;
    }

    .markdown-section blockquote {
      color: #8b949e !important;
      border-left: 0.25em solid #30363d;
      background-color: rgba(110,118,129,0.1) !important;
    }

    .markdown-section img {
      background-color: transparent !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    globalThis.$docsify = {
      name: 'QuanTAlib',
      repo: 'https://github.com/mihakralj/QuanTAlib',
      loadSidebar: true,
      subMaxLevel: 0,
      auto2top: true,
      homepage: 'README.md',
      relativePath: true,
    }
  </script>
  <!-- Docsify v4 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Sidebar Collapse Plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <!-- MathJax -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-latex@0"></script>
   <!-- Prism for C# syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-csharp.min.js"></script>
</body>
</html>
