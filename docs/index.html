<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuanTAlib Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Quantitative Technical Analysis Library in C#">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <style>
    :root {
      --base-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      --base-font-size: 16px;
      --theme-color: #58a6ff;
      --text-color: #c9d1d9;
      --background-color: #0d1117;
      --code-background: #161b22;
      --sidebar-background: #010409;
      --sidebar-text: #c9d1d9;
      --sidebar-border-color: #30363d;
    }

    body {
      font-family: var(--base-font-family);
      background-color: var(--background-color);
      color: var(--text-color);
    }

    .sidebar {
      background-color: var(--sidebar-background);
      border-right: 1px solid var(--sidebar-border-color);
      color: var(--sidebar-text);
    }

    .sidebar-nav li {
      margin: 0;
    }
    
    .sidebar-nav ul {
      padding-left: 0;
    }

    .sidebar-nav > ul > li {
      font-weight: 600;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
    }

    .sidebar-nav a {
      color: var(--theme-color);
      text-decoration: none;
    }

    .sidebar-nav a:hover {
      text-decoration: underline;
    }

    .app-name-link {
      color: var(--text-color) !important;
      font-weight: 600;
      font-size: 1.5em;
    }

    .markdown-section {
      max-width: 1012px;
      margin: 0 auto;
      padding: 30px 40px;
    }

    .markdown-section h1, .markdown-section h2, .markdown-section h3 {
      color: var(--text-color);
      font-weight: 600;
    }

    .markdown-section h1 {
      border-bottom: 1px solid #21262d;
      padding-bottom: 0.3em;
    }

    .markdown-section h2 {
      border-bottom: 1px solid #21262d;
      padding-bottom: 0.3em;
    }

    .markdown-section code {
      background-color: rgba(110,118,129,0.4);
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      font-size: 85%;
      padding: 0.2em 0.4em;
    }

    .markdown-section pre {
      background-color: var(--code-background);
      border-radius: 6px;
      border: 1px solid #30363d;
    }

    .markdown-section pre > code {
      background-color: transparent;
      padding: 0;
      font-size: 85%;
    }

    .markdown-section a {
      color: var(--theme-color);
      text-decoration: none;
    }

    .markdown-section a:hover {
      text-decoration: underline;
    }

    .markdown-section table {
      display: block;
      width: 100%;
      overflow: auto;
      border-spacing: 0;
      border-collapse: collapse;
    }

    .markdown-section table tr {
      background-color: var(--background-color);
      border-top: 1px solid #30363d;
    }

    .markdown-section table tr:nth-child(2n) {
      background-color: #161b22;
    }

    .markdown-section table th, .markdown-section table td {
      padding: 6px 13px;
      border: 1px solid #30363d;
    }

    .markdown-section blockquote {
      color: #8b949e;
      border-left: 0.25em solid #30363d;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    globalThis.$docsify = {
      name: 'QuanTAlib',
      repo: 'https://github.com/mihakralj/QuanTAlib',
      loadSidebar: true,
      subMaxLevel: 0,
      auto2top: true,
      homepage: '../README.md'
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Sidebar Collapse Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <!-- MathJax -->
  <script src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-latex@0"></script>
   <!-- Prism for C# syntax highlighting -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-csharp.min.js"></script>
</body>
</html>
